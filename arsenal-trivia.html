<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsenal Trivia | Gooner's Dushboard</title>
  <meta name="description" content="アーセナルのプレミアリーグ優勝、優勝争い、記録、選手、監督、スタジアムのエピソードを新しい順に整理したトリビア一覧。">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Arsenal Trivia">
  <meta property="og:description" content="アーセナルのプレミアリーグ優勝と優勝争いを中心に、新しい順で読める日本語トリビアページ。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/gooner-dashboard-bg.png">
  <link rel="stylesheet" href="arsenal-trivia.css">
</head>
<body>
  <header class="page-hero">
    <nav class="topbar" aria-label="Main navigation">
      <a class="brand" href="arsenal.html"><span class="brand-mark">A</span><span>Gooner's Dushboard</span></a>
      <div class="nav-links">
        <a href="arsenal.html">Dashboard</a>
        <a href="arsenal-matchday.html">Matchday</a>
        <a href="arsenal-transfer.html">Transfers</a>
        <a href="arsenal-articles.html">Articles</a>
        <a href="arsenal-pubs.html">Japan Pubs</a>
        <a href="arsenal-x.html">Players X</a>
      </div>
    </nav>
    <section class="hero-copy">
      <p class="eyebrow">Arsenal Knowledge Base</p>
      <h1>Arsenal Trivia</h1>
      <p>プレミアリーグ優勝、優勝争い、記録、名場面、監督と選手のこぼれ話を、新しい順に一気読みできる形で整理しました。</p>
    </section>
  </header>

  <main>
    <section class="summary-strip" aria-label="Trivia summary">
      <article>
        <strong id="totalCount">--</strong>
        <span>収録トリビア</span>
      </article>
      <article>
        <strong id="categoryCount">--</strong>
        <span>カテゴリ</span>
      </article>
      <article>
        <strong>1886</strong>
        <span>クラブの起源</span>
      </article>
    </section>

    <section class="controls" aria-label="Trivia filters">
      <label>
        <span>カテゴリ</span>
        <select id="categoryFilter">
          <option value="all">すべて</option>
        </select>
      </label>
      <label class="search-box">
        <span>検索</span>
        <input id="triviaSearch" type="search" placeholder="例: Wenger, Highbury, Invincibles">
      </label>
    </section>

    <section class="table-card" aria-label="Arsenal trivia table">
      <div class="table-header">
        <div>
          <p class="eyebrow">Newest First</p>
          <h2>プレミアリーグ優勝トリビア一覧</h2>
        </div>
        <span id="visibleCount" class="count-chip">--件</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>No.</th>
              <th>年代</th>
              <th>分類</th>
              <th>テーマ</th>
              <th>トリビア</th>
              <th>なぜ面白いか</th>
              <th>出典</th>
            </tr>
          </thead>
          <tbody id="triviaTable"></tbody>
        </table>
      </div>
      <p id="emptyState" class="empty-state" hidden>条件に合うトリビアが見つかりませんでした。</p>
    </section>

    <section class="ad-slot" data-ad-slot="trivia-bottom" aria-label="Advertisement"></section>
  </main>

  <script src="ads-config.js"></script>
  <script src="ads.js"></script>
  <script src="arsenal-trivia.js"></script>
</body>
</html>
